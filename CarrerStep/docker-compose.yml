services:
  web:
    build:
      context: .
    ports:
      - "5173:80"
    depends_on:
      - main-backend
    env_file:
      - .env

  main-backend:
    build:
      context: ./services/main-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mysql
      - redis
      - ai-backend

  ai-backend:
    build:
      context: ./services/ai-backend
    expose:
      - "8001"
    env_file:
      - .env
    volumes:
      - ai_logs:/data

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mysql_data:
  ai_logs:
